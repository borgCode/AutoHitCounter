<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="dark">
    <title>Auto Hit Counter Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body styling for transparent overlay */
        body {
            background: transparent;
            font-family: 'Segoe UI', sans-serif;
            color: #e0e0e0;
            font-size: 16px;
            overflow: hidden;
        }

        /* Container that holds all split rows */
        #splits {
            overflow-y: clip;
        }

        /* Progress indicator formatting */
        #progress {
            color: #bbb;
            font-size: 12px;
        }

        /* Attempt counter - purple when attempts > 0, white when 0 */
        #attempts {
            color: #FFF;
            font-size: 13px;
        }

        /* Main overlay container */
        #overlay {
            display: flex;
            flex-direction: column;
        }

        /* Title bar above header */
        #title {
            padding: 6px 8px;
            text-align: center;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Header row styling (Split / Hits / Diff / PB) */
        .header {
            display: grid;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #bbb;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 2px;
        }

        /* Center align header columns except the first */
        .header span:not(:first-child) {
            text-align: center;
            color: #bbb;
        }

        /* Individual split row */
        .split-row {
            display: grid;
            padding: 4px 8px;
            transition: background 0.2s ease, border-color 0.2s ease;
            border-left: 3px solid transparent;
        }


        /* Split name column */
        .split-row .col-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Center align numeric columns */
        .split-row .col-hits,
        .split-row .col-diff,
        .split-row .col-pb {
            text-align: center;
        }

        /* Current split when hit (red) */
        .split-row.current.hit {
            animation: highlight-red 0.3s ease-out;
        }

        @keyframes highlight-red {
            from {
                background: transparent;
                border-left-color: transparent;
            }
        }

        /* Current split when not hit (green) */
        .split-row.current {
            animation: highlight-green 0.3s ease-out;
        }

        @keyframes highlight-green {
            from {
                background: transparent;
                border-left-color: transparent;
            }
        }


        /* Parent category row styling */
        .split-row.parent {
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.03em;
            color: #999;
            padding-top: 8px;
            border-left-color: transparent;
            background: transparent;
        }

        /* Hide numbers for parent rows */
        .split-row.parent .col-hits,
        .split-row.parent .col-diff,
        .split-row.parent .col-pb {
            visibility: hidden;
        }

        /* Diff colors - overridden dynamically */
        .diff-pos {
            color: #ff4c4c;
        }

        .diff-neg {
            color: #00cc66;
        }

        .diff-zero {
            color: #bbb;
        }

        /* Footer container */
        .footer {
            display: grid;
            padding: 4px 8px 4px 10px;
            margin-top: 1px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 15px;
            font-weight: 450;

            color: #bbb;
        }

        /* Center align footer numeric columns */
        .footer .col-hits,
        .footer .col-diff,
        .footer .col-pb {
            text-align: center;
        }

        .footer .col-name {
            display: flex;
            align-items: center;
        }

        .footer .col-name .igt {
            flex: 1;
        }

        /* In-game timer styling */
        .igt {
            font-size: 16px;
            color: #c47fd4;
        }

        /* Table mode - adds borders to make it look like a table */
        .table-mode .header,
        .table-mode .split-row,
        .table-mode .footer {
            border: 1px solid rgba(255, 255, 255, 0.12);
            margin-bottom: -1px;
        }

        .table-mode .split-row {
            border-left-width: 1px;
        }

        /* Run complete banner */
        .run-complete {
            text-align: center;
            padding: 8px 12px;
            margin-top: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #00cc66;
            border-top: 1px solid rgba(0, 204, 102, 0.15);
            background: rgba(0, 204, 102, 0.06);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
<!-- Main overlay container -->
<div id="overlay">
    <!-- Title - shown above header when enabled -->
    <div id="title" style="display:none;"></div>
    <!-- Header row - columns injected by applyLayout() -->
    <div class="header" id="header"></div>
    <!-- Split rows - injected by renderState() -->
    <div id="splits"></div>
    <!-- Footer row - IGT + run totals, injected by renderState() -->
    <div class="footer" id="footer"></div>
    <!-- Shown when the run is complete -->
    <div class="run-complete" id="runComplete" style="display:none;">✓ Run Complete</div>
</div>

<script>
    (function () {
        const WS_URL = 'ws://localhost:16200';
        const RECONNECT_INTERVAL = 3000;

        const DEFAULTS = {
            showAttempts: true,
            prevSplits: 4,
            nextSplits: 10,
            showDiff: true,
            showPb: true,
            showIgt: true,
            overlayWidth: 380,
            overlayHeight: 500,
            showProgress: true,
            fontFamily: 'Segoe UI',
            fontSize: 16,
            rowHeight: 29,
            backgroundOpacity: 0,
            tableMode: false,
            hitsCurrentColor: '#888888',
            hitsClearedColor: '#00cc66',
            hitsActiveColor: '#c8843a',
            rowHitColor: 'rgba(255, 76, 76, 0.17)',
            rowClearedColor: 'rgba(0, 204, 102, 0.17)',
            diffPosColor: '#ff4c4c',
            diffNegColor: '#00cc66',
            diffZeroColor: '#bbbbbb',
            attemptsZeroColor: '#ffffff',
            attemptsActiveColor: '#9D61A8',
            headerTextColor: '#bbbbbb',
            igtColor: '#c47fd4',
            runCompleteBannerColor: '#00cc66',
            fontBold: false,
            fontItalic: false,
            fontUnderline: false,
            splitNameColor: '#e0e0e0',
            splitNameOnHitColor: '#e0e0e0',
            splitNameOnHitlessColor: '#e0e0e0',
            groupNameColor: '#999999',
            pbColor: '#bbbbbb',
            showFooterTotals: true,
            igtFontFamily: 'Consolas',
            igtFontSize: 17,
            alternatingRows: 'rgba(255, 255, 255, 0.05)',
            headerFontFamily: 'Segoe UI',
            headerFontSize: 13,
            showTitle: false,
            titleText: '',
            titleColor: '#e0e0e0',
            titleFontFamily: 'Segoe UI',
            titleFontSize: 20,
            showRunComplete: true,
            runCompleteText: '✓ Run Complete',
            pbMatchesHit: false,
            footerFontSize: 16,
            footerFontFamily: 'Segoe UI',
            footerHitFontColor: '#c8843a',
            footerHitsCurrentColor: '#888888',
            footerPbFontColor: '#bbbbbb',
            dpbHighlightColor: '#ffe766',
            showDpbHighlight: true,
            customCss: '',
        };

        let config = {...DEFAULTS};

        const saved = localStorage.getItem('overlayConfig');
        if (saved) {
            try {
                Object.assign(config, JSON.parse(saved));
            } catch {
            }
        }

        const overlay = document.getElementById('overlay');
        const headerEl = document.getElementById('header');
        const splitsEl = document.getElementById('splits');
        const runCompleteEl = document.getElementById('runComplete');

        let ws = null;
        let lastState = null;
        let lastCurrentIndex = -1;

        function connect() {
            ws = new WebSocket(WS_URL);
            ws.onopen = function () {
            };
            ws.onclose = function () {
                setTimeout(connect, RECONNECT_INTERVAL);
            };
            ws.onerror = function () {
                ws.close();
            };
            ws.onmessage = function (event) {
                const msg = JSON.parse(event.data);
                if (msg.type === 'state') {
                    lastState = msg.data;
                    renderState(msg.data);
                } else if (msg.type === 'igt') {
                    if (config.showIgt) {
                        const igtEl = document.getElementById('igt');
                        if (igtEl) igtEl.textContent = formatIgt(msg.data);
                    }
                } else if (msg.type === 'config') {
                    Object.assign(config, msg.data);
                    localStorage.setItem('overlayConfig', JSON.stringify(config));
                    applyLayout();
                    if (lastState) renderState(lastState);
                }
            };
        }

        function getVisibleRowCount() {
            const h = config.overlayHeight > 0 ? config.overlayHeight : 420;
            const rh = config.rowHeight > 0 ? config.rowHeight : 29;
            return Math.floor((h - 60) / rh);
        }

        function getGridColumns() {
            let cols = '3fr 0.5fr';
            if (config.showDiff) cols += ' 0.5fr';
            if (config.showPb) cols += ' 0.5fr';
            return cols;
        }

        function formatIgt(igt) {
            if (!igt) return '';
            return igt.replace(/^0(\d:)/, '$1')
        }

        // Injects a dynamic <style> block for properties that can't be set inline
        let dynamicStyleEl = null;

        function applyDynamicStyles() {
            if (!dynamicStyleEl) {
                dynamicStyleEl = document.createElement('style');
                document.head.appendChild(dynamicStyleEl);
            }
            dynamicStyleEl.textContent = `
                .diff-pos { color: ${config.diffPosColor}; }
                .diff-neg { color: ${config.diffNegColor}; }
                .diff-zero { color: ${config.diffZeroColor}; }
                .split-row:nth-child(even) { background: ${config.alternatingRows || 'transparent'}; }
                .split-row.pb-dpbhighlight { border-left-color: ${config.dpbHighlightColor}; }
                .table-mode .split-row.current { border-left: 3px solid ${config.currentSplitBorderColor}; }
                .split-row.current { background: ${config.currentSplitColor}; border-left-color: ${config.currentSplitBorderColor}; }
                .split-row.hit { background: ${config.rowHitColor}; }
                .split-row.cleared { background: ${config.rowClearedColor}; }
                .table-mode .split-row.current.hit { border-left: 3px solid ${config.currentSplitHitBorderColor}; }
                .split-row.current.hit { background: ${config.currentSplitHitColor}; border-left-color: ${config.currentSplitHitBorderColor}; }
                .split-row { height: ${config.rowHeight}px; font-size: ${config.fontSize}px; }
                .footer { font-family: ${config.footerFontFamily};
                        font-size: ${config.footerFontSize}px;
                        background: ${config.backgroundOpacity > 0 ? `rgba(0, 0, 0, ${config.backgroundOpacity})` : 'transparent'}; 
                        }
                .run-complete { 
                    color: ${config.runCompleteBannerColor}; 
                    border-top-color: ${config.runCompleteBannerColor}; 
                    background: ${config.backgroundOpacity > 0
                ? `linear-gradient(${config.runCompleteBannerColor}14, ${config.runCompleteBannerColor}14), rgba(0, 0, 0, ${config.backgroundOpacity})`
                : `${config.runCompleteBannerColor}14`}; 
                }
                @keyframes highlight-red {
                    from { background: transparent; border-left-color: transparent; }
                    to { background: ${config.currentSplitHitColor}; border-left-color: ${config.currentSplitHitBorderColor}; }
                }
                @keyframes highlight-green {
                    from { background: transparent; border-left-color: transparent; }
                    to { background: ${config.currentSplitColor}; border-left-color: ${config.currentSplitBorderColor}; }
                }
                .split-row .col-name { color: ${config.splitNameColor}; }
                .split-row.hit .col-name { color: ${config.splitNameOnHitColor}; }
                .split-row.cleared .col-name { color: ${config.splitNameOnHitlessColor}; }
                .split-row.parent { color: ${config.groupNameColor}; }
                .split-row .col-hits { color: ${config.hitsCurrentColor}; }
                .split-row.cleared .col-hits { color: ${config.hitsClearedColor}; }
                .split-row.hit .col-hits { color: ${config.hitsActiveColor}; }
                .split-row.current.hit .col-hits { color: ${config.hitsActiveColor}; }
                .split-row .col-pb { color: ${config.pbColor}; }
                .split-row.hit .col-pb { color: ${config.pbMatchesHit ? config.hitsActiveColor : config.pbColor}; }
                .split-row.cleared .col-pb { color: ${config.pbMatchesHit ? config.hitsClearedColor : config.pbColor}; }
                .split-row.current.hit .col-pb { color: ${config.pbMatchesHit ? config.hitsActiveColor : config.pbColor}; }
                .footer .col-hits { color: ${config.footerHitFontColor}; }
                .footer .col-pb { color: ${config.footerPbFontColor}; }
                #overlay, .split-row, .footer { 
                    font-weight: ${config.fontBold ? 'bold' : 'normal'};
                    font-style: ${config.fontItalic ? 'italic' : 'normal'};
                    text-decoration: ${config.fontUnderline ? 'underline' : 'none'};
                    font-family: ${config.fontFamily};
                }
                .header { 
                    color: ${config.headerTextColor}; 
                    font-family: ${config.headerFontFamily}; 
                    font-size: ${config.headerFontSize}px; 
                    font-weight: ${config.fontBold ? 'bold' : 'normal'};
                    font-style: ${config.fontItalic ? 'italic' : 'normal'};
                    text-decoration: ${config.fontUnderline ? 'underline' : 'none'};
                }
                #progress { font-size: ${config.headerFontSize + 1}px; }
                #attempts { font-size: ${config.headerFontSize + 2}px; }
                .header span:not(:first-child) { color: ${config.headerTextColor}; }
                .igt { color: ${config.igtColor}; font-family: ${config.igtFontFamily || 'Consolas, monospace'}; font-size: ${config.igtFontSize || 16}px; }
                #title { color: ${config.titleColor}; font-family: ${config.titleFontFamily || 'Segoe UI'}; font-size: ${config.titleFontSize || 18}px; }
                `;
        }

        let customCssElement = null;

        function applyCustomCss() {
            const customCss = (config.customCss || '').trim();
            if (!customCss) {
                if (customCssElement && customCssElement.parentNode) {
                    customCssElement.parentNode.removeChild(customCssElement);
                }
                customCssElement = null;
                return;
            }

            if (!customCssElement) {
                customCssElement = document.createElement('style');
                document.head.appendChild(customCssElement);
            }

            customCssElement.textContent = customCss;
        }

        function applyLayout() {
            const cols = getGridColumns();
            headerEl.style.gridTemplateColumns = cols;
            document.getElementById('footer').style.gridTemplateColumns = cols;

            overlay.style.background = config.backgroundOpacity > 0
                ? `rgba(0, 0, 0, ${config.backgroundOpacity})`
                : 'transparent';

            overlay.classList.toggle('table-mode', config.tableMode);

            overlay.style.width = config.overlayWidth + 'px';
            overlay.style.height = 'auto';
            overlay.style.maxHeight = 'none';
            overlay.style.overflow = 'visible';

            applyDynamicStyles();
            applyCustomCss();

            const titleEl = document.getElementById('title');
            if (config.showTitle && config.titleText) {
                titleEl.textContent = config.titleText;
                titleEl.style.display = 'block';
            } else {
                titleEl.style.display = 'none';
            }

            const progressHtml = config.showProgress ? ` <span id="progress"></span>` : '';
            const attemptsHtml = config.showAttempts ? ` <span id="attempts"></span>` : '';
            headerEl.innerHTML = `<span>Split${progressHtml}${attemptsHtml}</span><span>Hits</span>`
                + (config.showDiff ? '<span>Diff</span>' : '')
                + (config.showPb ? '<span>PB</span>' : '');
        }


        function renderState(state) {
            const cols = getGridColumns();
            let html = '';


            let splits = state.splits;
            const currentIndex = splits.findIndex(s => s.isCurrent);
            const total = splits.length;
            const maxRows = getVisibleRowCount();

            if (currentIndex >= 0) lastCurrentIndex = currentIndex;

            const anchor = currentIndex >= 0 ? currentIndex : lastCurrentIndex >= 0 ? lastCurrentIndex : 0;

            // Use prev/next as preferences, but redistribute unused slots
            const prevAvailable = anchor;
            const nextAvailable = total - anchor - 1;
            let prevWanted = config.prevSplits;
            let nextWanted = config.nextSplits;

            // If we can't fill prev, give surplus to next and vice versa
            const prevActual = Math.min(prevWanted, prevAvailable);
            const nextActual = Math.min(nextWanted + (prevWanted - prevActual), nextAvailable);
            const prevFinal = Math.min(prevWanted + (nextWanted - Math.min(nextWanted, nextAvailable)), prevAvailable);

            let start = Math.max(0, anchor - prevFinal);
            let end = Math.min(total, anchor + nextActual + 1);

            if (end - start > maxRows) {
                if (anchor - start >= maxRows) {
                    start = Math.max(0, anchor - Math.min(prevFinal, maxRows - 1));
                }
                end = Math.min(total, start + maxRows);
            }

            splits = splits.slice(start, end);

            // Distance PB
            const dpbIndex = state.distancePb ?? -1;
            const isBeatingDpb = currentIndex >= 0 && currentIndex > dpbIndex && state.totalHits === 0;
            const dpbHighlightIndex = (dpbIndex < 0 || !config.showDpbHighlight || state.isRunComplete || isBeatingDpb)
                ? -1
                : dpbIndex;

            for (let i = 0; i < splits.length; i++) {
                html += buildRow(splits[i], cols, start + i, currentIndex, dpbHighlightIndex);
            }
            splitsEl.innerHTML = html;

            const footerEl = document.getElementById('footer');
            const progressEl = document.getElementById('progress');
            if (progressEl && !state.isRunComplete) {
                const children = state.splits.filter(s => !s.isParent);
                const current = children.findIndex(s => s.isCurrent) + 1;
                const total = children.length;
                progressEl.textContent = `(${current}/${total})`;
            }

            const attemptsEl = document.getElementById('attempts');
            if (attemptsEl && state.attemptCount != null) {
                attemptsEl.textContent = `#${state.attemptCount}`;
                attemptsEl.style.color = state.attemptCount > 0
                    ? config.attemptsActiveColor
                    : config.attemptsZeroColor;
            }

            const igtHtml = config.showIgt
                ? `<span class="igt" id="igt">${formatIgt(state.inGameTime ?? '')}</span>`
                : `<span id="igt"></span>`;
            const diffClass = state.totalDiff > 0 ? 'diff-pos' : state.totalDiff < 0 ? 'diff-neg' : 'diff-zero';
            const diffText = state.totalDiff > 0 ? `+${state.totalDiff}` : `${state.totalDiff}`;
            const totalHitsColor = state.totalHits > 0
                ? config.footerHitFontColor
                : config.footerHitsCurrentColor;

            footerEl.innerHTML =
                `<span class="col-name">${igtHtml}</span>
    ${config.showFooterTotals ? `
        <span class="col-hits" style="color:${totalHitsColor}">${state.totalHits}</span>
        ${config.showDiff ? `<span class="col-diff ${diffClass}">${diffText}</span>` : ''}
        ${config.showPb ? `<span class="col-pb">${state.totalPb}</span>` : ''}
    ` : ''}`;

            runCompleteEl.style.display = (state.isRunComplete && config.showRunComplete) ? 'block' : 'none';
            runCompleteEl.textContent = config.runCompleteText?.trim() || '✓ Run Complete';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        function buildRow(s, cols, index, currentIndex, dpbHighlightIndex) {
            const current = s.isCurrent ? ' current' : '';
            const parent = s.isParent ? ' parent' : '';
            const diffClass = s.diff > 0 ? 'diff-pos' : s.diff < 0 ? 'diff-neg' : 'diff-zero';
            const diffText = s.diff > 0 ? `+${s.diff}` : `${s.diff}`;
            const isPast = currentIndex === -1 ? true : index < currentIndex;
            const cleared = isPast && !s.isParent && s.hits === 0 ? ' cleared' : '';
            const hit = (isPast && !s.isParent && s.hits > 0) || (s.isCurrent && s.hits > 0) ? ' hit' : '';
            const dpbhighlight = index === dpbHighlightIndex ? ' pb-dpbhighlight' : '';

            return `<div class="split-row${parent}${current}${cleared}${hit}${dpbhighlight}" style="grid-template-columns: ${cols}">
                <span class="col-name">${escapeHtml(s.name)}</span>
                <span class="col-hits">${s.hits}</span>
                ${config.showDiff ? `<span class="col-diff ${diffClass}">${diffText}</span>` : ''}
                ${config.showPb ? `<span class="col-pb">${s.pb}</span>` : ''}
            </div>`;
        }

        applyLayout();
        connect();
    })
    ();
</script>
</body>
</html>
